<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PianoPlay</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">Piano<span>Play</span></div>
    <div class="search">
      <svg class="search-ico" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Поиск мелодии..." autocomplete="off">
      <div class="dropdown" id="dropdown"></div>
    </div>
  </header>

  <div class="body-row">
    <aside class="ad">AD</aside>

    <main>
      <div id="welcome">
        <h2>Найдите мелодию в поиске</h2>
        <p>Ноты появятся на экране, а клавиши пианино подсветятся при воспроизведении</p>
        <div class="quick">
          <button onclick="playSong(3)">⭐ Twinkle Star</button>
          <button onclick="playSong(2)">💐 К Элизе</button>
          <button onclick="playSong(14)">⚔️ Имперский марш</button>
          <button onclick="playSong(12)">🌊 River Flows</button>
        </div>
      </div>

      <div id="playerBar" class="player-bar hidden">
        <div class="player-left">
          <span class="p-icon" id="pIcon">🎵</span>
          <div class="player-meta">
            <strong id="pTitle"></strong>
            <small id="pArtist"></small>
          </div>
        </div>
        <div class="player-center">
          <button class="pb" onclick="restartSong()" title="Сначала">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </button>
          <button class="pb main" id="btnPlay" onclick="togglePlay()" title="Play / Pause">
            <svg class="ic-play" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg class="ic-pause" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="display:none"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
          </button>
          <button class="pb" onclick="stopSong()" title="Стоп">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </button>
        </div>
        <div class="player-right">
          <span class="tempo-lbl">Темп</span>
          <input type="range" id="tempo" min="0.3" max="2.5" step="0.05" value="1">
          <span class="tempo-val" id="tempoVal">1.0×</span>
        </div>
        <div class="progress"><div id="progBar"></div></div>
      </div>

      <div id="sheet" class="sheet hidden"></div>

      <div class="piano-area">
        <div class="piano-top">
          <div class="piano-controls">
            <label>Октавы <input type="range" id="rngOct" min="2" max="8" value="5"> <span id="valOct">5</span></label>
            <label>Старт <input type="range" id="rngStart" min="1" max="6" value="2"> <span id="valStart">C2</span></label>
          </div>
        </div>
        <div class="piano-wrap">
          <div class="piano-viewport" id="pianoViewport">
            <div class="piano" id="piano"></div>
          </div>
          <input type="range" class="piano-slider" id="pianoSlider" min="0" max="100" value="0" step="0.1">
        </div>
      </div>
    </main>

    <aside class="ad">AD</aside>
  </div>

  <script src="audio.js"></script>
  <script src="songs.js"></script>
  <script src="piano.js"></script>
  <script src="app.js"></script>
</body>
</html>
