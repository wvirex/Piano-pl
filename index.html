<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PianoPlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Ambient background blobs -->
  <div class="ambient">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <a href="#" class="logo" onclick="location.reload(); return false;">
      <svg class="logo-icon" viewBox="0 0 32 32" width="28" height="28">
        <rect x="2" y="8" width="4" height="18" rx="1" fill="#fff"/>
        <rect x="7" y="8" width="4" height="18" rx="1" fill="#fff"/>
        <rect x="12" y="8" width="4" height="18" rx="1" fill="#fff"/>
        <rect x="17" y="8" width="4" height="18" rx="1" fill="#fff"/>
        <rect x="22" y="8" width="4" height="18" rx="1" fill="#fff"/>
        <rect x="4" y="8" width="3" height="11" rx="1" fill="#7c3aed"/>
        <rect x="9" y="8" width="3" height="11" rx="1" fill="#7c3aed"/>
        <rect x="19" y="8" width="3" height="11" rx="1" fill="#7c3aed"/>
        <rect x="24" y="8" width="3" height="11" rx="1" fill="#7c3aed"/>
      </svg>
      <span class="logo-text">Piano<span class="logo-accent">Play</span></span>
    </a>

    <div class="search-wrapper">
      <div class="search-box" id="searchBox">
        <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Найти мелодию..." autocomplete="off" spellcheck="false">
        <kbd class="search-hint" id="searchHint">/</kbd>
      </div>
      <div class="search-dropdown" id="searchDropdown">
        <div class="search-dropdown-inner" id="searchResults"></div>
      </div>
    </div>

    <button class="header-btn" id="themeToggle" title="Тема">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </header>

  <!-- Main content area -->
  <main class="main-layout">

    <!-- Left ad slot -->
    <aside class="ad-slot ad-left">
      <div class="ad-placeholder">
        <span>AD</span>
      </div>
    </aside>

    <!-- Center content -->
    <section class="content">

      <!-- Welcome / empty state -->
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-inner">
          <div class="welcome-keys">
            <div class="wk wk-1"></div>
            <div class="wk wk-2"></div>
            <div class="wk wk-3"></div>
            <div class="wk wk-b wk-b1"></div>
            <div class="wk wk-b wk-b2"></div>
          </div>
          <h1 class="welcome-title">Играйте мелодии <span>по нотам</span></h1>
          <p class="welcome-desc">Найдите мелодию в поиске — ноты отобразятся на экране, а клавиши пианино будут подсвечиваться в реальном времени</p>
          <div class="welcome-tags">
            <button class="tag" onclick="selectSong(3)">⭐ Twinkle Twinkle</button>
            <button class="tag" onclick="selectSong(2)">💐 К Элизе</button>
            <button class="tag" onclick="selectSong(14)">⚔️ Имперский марш</button>
            <button class="tag" onclick="selectSong(15)">🌊 River Flows in You</button>
          </div>
          <p class="welcome-hint">Или нажмите на клавиши пианино, чтобы просто поиграть</p>
        </div>
      </div>

      <!-- Player bar (shown when song is active) -->
      <div class="player" id="player">
        <div class="player-track">
          <div class="player-icon" id="playerIcon">🎵</div>
          <div class="player-info">
            <span class="player-title" id="playerTitle">—</span>
            <span class="player-artist" id="playerArtist">—</span>
          </div>
        </div>
        <div class="player-controls">
          <button class="ctrl-btn" id="restartBtn" onclick="restartSong()" title="Сначала">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </button>
          <button class="ctrl-btn ctrl-main" id="playPauseBtn" onclick="togglePlayPause()" title="Play/Pause">
            <svg class="icon-play" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg class="icon-pause" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" style="display:none"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
          </button>
          <button class="ctrl-btn" id="stopBtn" onclick="stopSong()" title="Стоп">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
          </button>
        </div>
        <div class="player-tempo">
          <span class="tempo-label">Темп</span>
          <input type="range" id="tempoSlider" class="tempo-range" min="0.3" max="2.5" step="0.05" value="1">
          <span class="tempo-value" id="tempoValue">1.0×</span>
        </div>
        <div class="player-progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <!-- Note sheet -->
      <div class="note-sheet" id="noteSheet">
        <div class="note-sheet-scroll" id="noteSheetScroll"></div>
      </div>

      <!-- Piano section -->
      <div class="piano-section">
        <div class="piano-toolbar">
          <div class="octave-control">
            <label>Октавы</label>
            <input type="range" id="octaveRange" min="2" max="8" step="1" value="5">
            <span class="octave-value" id="octaveValue">5</span>
          </div>
          <div class="octave-control">
            <label>Начало</label>
            <input type="range" id="startOctave" min="1" max="6" step="1" value="2">
            <span class="octave-value" id="startOctaveValue">C2</span>
          </div>
        </div>
        <div class="piano-viewport" id="pianoViewport">
          <div class="piano" id="piano"></div>
        </div>
      </div>

    </section>

    <!-- Right ad slot -->
    <aside class="ad-slot ad-right">
      <div class="ad-placeholder">
        <span>AD</span>
      </div>
    </aside>

  </main>

  <script src="js/audio.js"></script>
  <script src="js/songs.js"></script>
  <script src="js/piano.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
