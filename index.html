<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PianoPlay</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="body-row">
    <aside class="ad">AD</aside>

    <main>
      <!-- Welcome -->
      <div id="welcome" class="center-area">
        <div class="logo">Piano<span>Play</span></div>
        <div class="search">
          <svg class="search-ico" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="search" placeholder="Поиск мелодии..." autocomplete="off">
          <div class="dropdown" id="dropdown"></div>
        </div>
        <button type="button" class="btn-library" onclick="openLibrary()">Вся библиотека</button>
      </div>

      <!-- Player + Sheet (shown after song select) -->
      <div id="songView" class="song-view hidden">
        <div class="song-header">
          <div class="song-info">
            <span class="song-icon" id="pIcon">🎵</span>
            <div>
              <strong id="pTitle"></strong>
              <small id="pArtist"></small>
            </div>
          </div>
          <div class="search search-small">
            <svg class="search-ico" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" id="search2" placeholder="Другая мелодия..." autocomplete="off">
            <div class="dropdown" id="dropdown2"></div>
          </div>
          <button type="button" class="btn-library btn-library-inline" onclick="openLibrary()" title="Все мелодии">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
          </button>
          <div class="controls">
            <button class="cb" onclick="restartSong()" title="Сначала">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button class="cb main" id="btnPlay" onclick="togglePlay()">
              <svg class="ic-play" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              <svg class="ic-pause" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="display:none"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
            </button>
            <button class="cb" onclick="stopSong()" title="Стоп">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            </button>
            <div class="tempo-box">
              <input type="range" id="tempo" min="0.3" max="2.5" step="0.05" value="1">
              <span id="tempoVal">1.0×</span>
            </div>
          </div>
          <div class="progress"><div id="progBar"></div></div>
        </div>
        <div id="sheet" class="sheet"></div>
      </div>

      <!-- Piano always at bottom -->
      <div class="piano-area">
        <div class="piano-nav">
          <span class="piano-nav-label">Прокрутка клавиатуры</span>
          <input type="range" class="piano-slider" id="pianoSlider" min="0" max="100" value="0" step="0.5">
        </div>
        <div class="piano-viewport" id="pianoViewport">
          <div class="piano" id="piano"></div>
        </div>
      </div>
    </main>

    <aside class="ad">AD</aside>
  </div>

  <div id="libraryModal" class="library-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="libraryTitle">
    <div class="library-panel">
      <div class="library-head">
        <h3 id="libraryTitle">Все мелодии</h3>
        <button type="button" class="library-close" onclick="closeLibrary()" aria-label="Закрыть">×</button>
      </div>
      <div class="library-list" id="libraryList"></div>
    </div>
  </div>

  <script src="audio.js"></script>
  <script src="songs.js"></script>
  <script src="piano.js"></script>
  <script src="app.js"></script>
</body>
</html>
